<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026 노동인권 학교 방문 프로그램</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 파이어베이스 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyDDQoegaPeFWypWdVsgRmzMr_Z7J6dwQt8",
            authDomain: "labor-7b138.firebaseapp.com",
            projectId: "labor-7b138",
            storageBucket: "labor-7b138.firebasestorage.app",
            messagingSenderId: "598653631387",
            appId: "1:598653631387:web:cd950619198fa209f97f3e",
            measurementId: "G-Y2JX4CVQVP"
        };
    
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'school-booking-app-2026';

        // 학교 데이터
        const rawSchools = [
            { region: "관악", name: "신림중", date: "2026-09-16", day: "수", time: "12:20~14:50" },
            { region: "영등포", name: "여의도중학교", date: "2026-10-16", day: "금", time: "9:55~12:30" },
            { region: "관악", name: "봉림중", date: "2026-11-06", day: "금", time: "9:00~11:35" },
            { region: "관악", name: "인헌중", date: "2026-11-09", day: "월", time: "8:50~11:25" },
            { region: "동작", name: "성남중학교", date: "2026-11-09", day: "월", time: "13:20~15:55" },
            { region: "광진", name: "건대부중", date: "2026-11-11", day: "수", time: "8:50-11:25" },
            { region: "관악", name: "미성중", date: "2026-11-12", day: "목", time: "9:00~11:35" },
            { region: "영등포", name: "대영중학교", date: "2026-11-12", day: "목", time: "13:20~15:55" },
            { region: "동작", name: "상현중학교", date: "2026-11-13", day: "금", time: "9:45~12:20" },
            { region: "광진", name: "광진중", date: "2026-11-13", day: "금", time: "9:55-12:30" },
            { region: "서초", name: "내곡중학교(1)", date: "2026-11-16", day: "월", time: "9:00~11:35" },
            { region: "광진", name: "동대부가람중", date: "2026-11-17", day: "화", time: "9:00-11:35" },
            { region: "서초", name: "내곡중학교(2)", date: "2026-11-17", day: "화", time: "9:00~11:35" },
            { region: "서대문", name: "이화금란중학교", date: "2026-11-17", day: "화", time: "9:40~12:15" },
            { region: "서대문", name: "인창중학교", date: "2026-11-18", day: "수", time: "8:40~11:15" },
            { region: "관악", name: "성보중", date: "2026-11-18", day: "수", time: "13:20~15:55" },
            { region: "관악", name: "신관중", date: "2026-11-23", day: "월", time: "9:55~12:30" },
            { region: "관악", name: "봉원중", date: "2026-11-26", day: "목", time: "9:00~11:35" },
            { region: "관악", name: "남서울중", date: "2026-11-26", day: "목", time: "9:00-11:35" },
            { region: "영등포", name: "선유중학교", date: "2026-11-30", day: "화", time: "13:30~15:10" },
            { region: "관악", name: "미림여고", date: "2026-12-01", day: "화", time: "9:00-11:00" },
            { region: "광진", name: "광양중", date: "2026-12-01", day: "화", time: "13:10-15:45" },
            { region: "도봉", name: "정의여중학교", date: "2026-12-01", day: "화", time: "13:20~16:00" },
            { region: "관악", name: "당곡중", date: "2026-12-02", day: "수", time: "9:45~12:20" },
            { region: "관악", name: "구암중", date: "2026-12-03", day: "목", time: "8:50~11:25" },
            { region: "서대문", name: "가재울중학교", date: "2026-12-03", day: "목", time: "9:00~11:35" },
            { region: "영등포", name: "영남중학교", date: "2026-12-04", day: "금", time: "9:45~12:20" },
            { region: "광진", name: "신양중", date: "2026-12-07", day: "월", time: "9:00-11:35" },
            { region: "도봉", name: "방학중학교", date: "2026-12-07", day: "월", time: "9:00~11:35" },
            { region: "도봉", name: "백운중학교", date: "2026-12-08", day: "화", time: "9:00~11:35" },
            { region: "관악", name: "삼성중", date: "2026-12-08", day: "화", time: "8:50~11:25" },
            { region: "관악", name: "난우중", date: "2026-12-08", day: "화", time: "13:25~16:00" },
            { region: "관악", name: "관악중", date: "2026-12-10", day: "목", time: "9:55~12:30" },
            { region: "서초", name: "원촌중학교", date: "2026-12-11", day: "금", time: "8:50~11:25" },
            { region: "도봉", name: "효문중학교", date: "2026-12-11", day: "금", time: "9:00~11:35" },
            { region: "관악", name: "서울문영여중", date: "2026-12-14", day: "월", time: "12:25~15:00" },
            { region: "동작", name: "강남중", date: "2026-12-15", day: "화", time: "8:50~11:25" }
        ].map((s, idx) => ({ ...s, id: `school_${idx}` }));

        let userName = localStorage.getItem('school_app_user_name') || '';
        let isAdmin = false;
        let currentViewMode = 'timeline';
        let allBookings = []; 
        let currentUser = null;

        // "2027" 문자열에 대한 정확한 해시값입니다.
        const ADMIN_HASH = '1538302'; 

        const hashPassword = (str) => {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return hash.toString();
        };

        async function initApp() {
            try {
                const cred = await auth.signInAnonymously();
                currentUser = cred.user;
                subscribeToData();
                render();
            } catch (error) {
                console.error("인증 실패:", error);
                document.getElementById('app').innerHTML = `<div class="p-8 text-center text-red-500">서버 접속 실패<br>익명 로그인을 활성화해주세요.</div>`;
            }
        }

        function subscribeToData() {
            db.collection(appId).doc('public').collection('bookings')
                .onSnapshot((snapshot) => {
                    allBookings = [];
                    snapshot.forEach(doc => {
                        allBookings.push({ docId: doc.id, ...doc.data() });
                    });
                    render();
                });
        }

        window.toggleBooking = async (schoolId) => {
            if (!userName || !currentUser) return;
            const myBooking = allBookings.find(b => b.schoolId === schoolId && b.userName === userName);
            
            if (myBooking) {
                if (confirm(`신청을 취소하시겠습니까?`)) {
                    await db.collection(appId).doc('public').collection('bookings').doc(myBooking.docId).delete();
                }
            } else {
                const school = rawSchools.find(s => s.id === schoolId);
                if (confirm(`${school.name} 방문을 신청하시겠습니까?`)) {
                    await db.collection(appId).doc('public').collection('bookings').doc(`${schoolId}_${currentUser.uid}`).set({
                        schoolId: schoolId,
                        schoolName: school.name,
                        userName: userName,
                        userId: currentUser.uid,
                        timestamp: Date.now()
                    });
                }
            }
        };

        window.adminCancel = async (docId) => {
            if (!isAdmin) return;
            if (confirm("관리자 권한으로 취소하시겠습니까?")) {
                await db.collection(appId).doc('public').collection('bookings').doc(docId).delete();
            }
        };

        window.copyForGoogleSheets = () => {
            if (!isAdmin) return;
            let tsvContent = "지역\t학교명\t방문일자\t요일\t시간\t신청자명\t신청일시\n";
            allBookings.sort((a,b) => a.timestamp - b.timestamp).forEach(b => {
                const school = rawSchools.find(s => s.id === b.schoolId) || {};
                tsvContent += `${school.region}\t${school.name}\t${school.date}\t${school.day}\t${school.time}\t${b.userName}\t${new Date(b.timestamp).toLocaleString()}\n`;
            });
            const textarea = document.createElement('textarea');
            textarea.value = tsvContent;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            alert('클립보드에 복사되었습니다.');
            document.body.removeChild(textarea);
        };

        window.setUserName = () => {
            const input = document.getElementById('userNameInput').value.trim();
            if (input) {
                userName = input;
                localStorage.setItem('school_app_user_name', userName);
                render();
            }
        };

        window.toggleAdmin = () => {
            if (!isAdmin) {
                const pw = prompt('관리자 비밀번호를 입력하세요.');
                if (pw !== null) {
                    if (hashPassword(pw) === ADMIN_HASH) {
                        isAdmin = true;
                    } else {
                        alert('비밀번호가 일치하지 않습니다.');
                    }
                }
            } else {
                isAdmin = false;
            }
            render();
        };

        window.setViewMode = (mode) => { currentViewMode = mode; render(); };
        window.logout = () => { localStorage.removeItem('school_app_user_name'); userName = ''; isAdmin = false; render(); };

        function render() {
            const app = document.getElementById('app');
            if (!userName) app.innerHTML = getLoginHTML();
            else if (isAdmin) app.innerHTML = getAdminHTML();
            else app.innerHTML = getMainHTML();
        }

        function getLoginHTML() {
            return `<div class="flex items-center justify-center min-h-screen bg-[#F8FAFC] p-4">
                <div class="bg-white p-10 rounded-[2rem] shadow-xl w-full max-w-md text-center">
                    <h1 class="text-2xl font-black text-gray-800 mb-6">2026 노동인권 신청</h1>
                    <input type="text" id="userNameInput" placeholder="강사님 성함" class="w-full px-5 py-4 border-2 border-gray-100 rounded-2xl mb-4 outline-none focus:border-blue-500 font-bold">
                    <button onclick="setUserName()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg shadow-lg shadow-blue-200 active:scale-95 transition-transform">접속하기</button>
                </div>
            </div>`;
        }

        function renderSchoolCard(school, isTimeline = false) {
            const schoolBookings = allBookings.filter(b => b.schoolId === school.id);
            const isMyBooking = schoolBookings.some(b => b.userName === userName);
            return `<div onclick="toggleBooking('${school.id}')" class="cursor-pointer bg-white p-5 rounded-2xl border-2 transition-all relative ${isMyBooking ? 'border-blue-500 ring-4 ring-blue-50 shadow-md' : 'border-gray-100 hover:border-gray-200 shadow-sm'}">
                ${isMyBooking ? '<div class="absolute top-0 right-0 bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl">내 신청 ✓</div>' : ''}
                <div class="mb-3"><span class="px-2.5 py-1 bg-gray-100 text-gray-600 text-[10px] font-black rounded-lg">${school.region}</span></div>
                <h3 class="text-lg font-black text-gray-800 mb-2">${school.name}</h3>
                <div class="text-xs text-gray-500 font-medium">
                    ${!isTimeline ? `<p>📅 ${school.date} (${school.day})</p>` : ''}
                    <p class="text-blue-600 font-black">⏰ ${school.time}</p>
                </div>
            </div>`;
        }

        function getMainHTML() {
            const grouped = {};
            rawSchools.forEach(s => { if(!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push(s); });
            const dates = Object.keys(grouped).sort();
            return `<div class="min-h-screen bg-[#f3f4f6] pb-10">
                <header class="bg-white p-6 shadow-sm mb-6 sticky top-0 z-20 flex justify-between items-center">
                    <div><h1 class="text-xl font-black">2026 노동인권</h1><p class="text-xs font-bold text-blue-600">${userName} 강사님</p></div>
                    <div class="flex gap-2"><button onclick="toggleAdmin()" class="px-3 py-2 text-xs bg-gray-100 font-bold rounded-lg">관리자</button><button onclick="logout()" class="px-3 py-2 text-xs bg-red-50 text-red-500 font-bold rounded-lg">로그아웃</button></div>
                </header>
                <div class="max-w-6xl mx-auto px-4">
                    <div class="flex bg-gray-200 p-1 rounded-xl w-fit mb-6">
                        <button onclick="setViewMode('timeline')" class="px-4 py-2 text-xs font-black rounded-lg ${currentViewMode==='timeline'?'bg-white text-blue-600 shadow-sm':'text-gray-500'}">달력보기</button>
                        <button onclick="setViewMode('card')" class="px-4 py-2 text-xs font-black rounded-lg ${currentViewMode==='card'?'bg-white text-blue-600 shadow-sm':'text-gray-500'}">전체보기</button>
                    </div>
                    ${currentViewMode==='timeline' ? `<div class="space-y-6">${dates.map(d => `<div class="mb-4"><h2 class="text-lg font-black mb-3 text-gray-400">${d}</h2><div class="grid grid-cols-1 sm:grid-cols-2 gap-3">${grouped[d].map(s=>renderSchoolCard(s,true)).join('')}</div></div>`).join('')}</div>` : `<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">${rawSchools.map(s=>renderSchoolCard(s)).join('')}</div>`}
                </div>
            </div>`;
        }

        function getAdminHTML() {
            const active = rawSchools.map(s => ({...s, bookings: allBookings.filter(b=>b.schoolId===s.id)})).filter(s=>s.bookings.length>0);
            return `<div class="min-h-screen bg-gray-50 p-6">
                <header class="flex justify-between items-center mb-6 bg-gray-900 text-white p-6 rounded-3xl">
                    <h1 class="font-black text-xl">📊 관리자 대시보드</h1>
                    <div class="flex gap-2"><button onclick="copyForGoogleSheets()" class="px-4 py-2 bg-green-600 rounded-xl text-xs font-bold">시트 복사</button><button onclick="toggleAdmin()" class="px-4 py-2 bg-white text-gray-900 rounded-xl text-xs font-bold">나가기</button></div>
                </header>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    ${active.map(s => `<div class="bg-white rounded-2xl shadow-sm border p-5">
                        <div class="flex justify-between mb-4"><div><span class="text-[10px] font-black text-blue-600">${s.region}</span><h2 class="font-black">${s.name}</h2></div><div class="text-right text-xs font-bold text-blue-600">${s.bookings.length}명</div></div>
                        <div class="space-y-2">${s.bookings.map(b => `<div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl"><span class="text-sm font-bold">👤 ${b.userName}</span><button onclick="adminCancel('${b.docId}')" class="text-[10px] text-red-500 font-black">취소</button></div>`).join('')}</div>
                    </div>`).join('')}
                </div>
            </div>`;
        }

        window.onload = initApp;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <div class="flex flex-col items-center justify-center min-h-screen">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-blue-600 mb-4"></div>
            <p class="text-blue-600 text-sm font-black tracking-widest uppercase">데이터 서버 연결 중...</p>
        </div>
    </div>
</body>
</html>
